<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>cARita</title>
    <meta property="og:title"       content="cARita" />
    <meta property="og:description" content="Still on the outside. Alive on the inside." />
    <meta property="og:image"       content="https://carita.pages.dev/assets/postcard.png" />
    <meta property="og:url"         content="https://carita.pages.dev" />
    <meta property="og:type"        content="website" />
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="cARita" />
    <meta name="twitter:description" content="Still on the outside. Alive on the inside." />
    <meta name="twitter:image"       content="https://carita.pages.dev/assets/postcard.png" />
    <link rel="stylesheet" href="./style.css" />
    <!-- A-Frame must load before MindAR -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <!-- MindAR A-Frame integration -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>

    <!-- JS error display -->
    <div id="error-overlay"></div>

    <!-- Splash screen -->
    <div id="splash">
      <h1 class="splash-title">c<span class="gradient-ar">AR</span>ita</h1>
      <p class="splash-slogan">Still on the outside. Alive on the inside.</p>
      <div class="splash-divider"></div>
      <p class="splash-subtitle">Point your camera at the postcard to reveal your message</p>
      <button id="start-btn" onclick="startExperience()">Tap to Start</button>
      <p class="splash-hint">Allow camera access when prompted</p>
    </div>

    <!-- Minimal scan frame (hidden until splash dismissed, hidden again when target found) -->
    <div id="scan-ui">
      <button id="home-btn" onclick="goHome()">&#8592; Back</button>
      <button id="torch-btn" onclick="toggleTorch()">&#9728;</button>
      <div id="ar-loader">
        <div class="ar-loader-ring"></div>
        <span class="ar-loader-text">Loading&hellip;</span>
      </div>
      <div class="scan-frame">
        <div class="scan-corner tl"></div>
        <div class="scan-corner tr"></div>
        <div class="scan-corner bl"></div>
        <div class="scan-corner br"></div>
      </div>
      <span class="scan-label">Point at postcard</span>
    </div>

    <!-- Greeting: shown only when a target is actively detected -->
    <div id="greeting"></div>

    <!-- Download button: shown only when a target is actively detected -->
    <a id="download-btn" href="#" download> Save Video</a>

    <a-scene
      mindar-image="imageTargetSrc: ./assets/targets.mind; autoStart: true; uiLoading: no; uiError: yes; uiScanning: no;"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <!--
          ADD MORE VIDEOS HERE for additional targets.
          Each video id must match the data-video attribute on its target entity below.
        -->
        <video id="video-0" src="./assets/animation.mp4"  preload="auto" playsinline muted loop webkit-playsinline></video>
        <video id="video-1" src="./assets/animation2.mp4" preload="auto" playsinline muted loop webkit-playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!--
        ═══ HOW TO ADD MORE TARGETS ════════════════════════════════════════
        1. Go to https://hiukim.github.io/mind-ar-js-doc/tools/compile
        2. Upload ALL your images at once — order matters (first = index 0, second = index 1, …)
        3. Download the new targets.mind and replace the old one in your project
        4. Add a <video> above for each new video file
        5. Copy the <a-entity> block below, increment targetIndex, update data-video and data-download
        ════════════════════════════════════════════════════════════════════
      -->

      <!-- Target 0 — postcard.png → animation.mp4 -->
      <a-entity
        mindar-image-target="targetIndex: 0"
        data-video="#video-0"
        data-download="assets/animation.mp4"
        data-message="Central Market, KL, 1 January 2026"
      >
        <!-- width=1, height=0.667 matches postcard 6×4 in landscape ratio -->
        <a-video src="#video-0" width="1" height="0.667" position="0 0 0" rotation="0 0 0"></a-video>
      </a-entity>

      <!-- Target 1 — postcard2.png → animation2.mp4 -->
      <a-entity
        mindar-image-target="targetIndex: 1"
        data-video="#video-1"
        data-download="assets/animation2.mp4"
        data-message="Sultan Abdul Samad Building, KL, 1 January 2026"
      >
        <a-video src="#video-1" width="1" height="0.667" position="0 0 0" rotation="0 0 0"></a-video>
      </a-entity>
      

    </a-scene>

    <script src="./app.js"></script>
  </body>
</html>
