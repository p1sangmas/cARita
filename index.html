<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>cARita</title>
    <!-- A-Frame must load before MindAR -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <!-- MindAR A-Frame integration -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #000; }

      /* Visible error overlay — shows JS errors without needing DevTools -->
      #error-overlay {
        position: fixed;
        top: 0; left: 0; right: 0;
        z-index: 99999;
        display: none;
        background: rgba(180,0,0,0.9);
        color: #fff;
        font-family: monospace;
        font-size: 12px;
        padding: 12px;
        max-height: 50%;
        overflow-y: auto;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>

    <div id="error-overlay"></div>

    <a-scene
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: yes; uiError: yes; uiScanning: yes;"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <video
          id="ar-video"
          src="./animation.mp4"
          preload="auto"
          playsinline
          muted
          loop
          webkit-playsinline
        ></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video
          src="#ar-video"
          width="1"
          height="0.667"
          position="0 0 0"
          rotation="0 0 0"
        ></a-video>
      </a-entity>
    </a-scene>

    <script>
      function showError(msg) {
        var el = document.getElementById('error-overlay');
        el.style.display = 'block';
        el.textContent += msg + '\n';
      }
      window.onerror = function (msg, src, line) {
        showError(msg + ' (' + src + ':' + line + ')');
      };
      window.addEventListener('unhandledrejection', function (e) {
        showError('Promise rejection: ' + e.reason);
      });

      document.addEventListener('DOMContentLoaded', function () {
        var video = document.getElementById('ar-video');
        var target = document.querySelector('[mindar-image-target]');
        target.addEventListener('targetFound', function () { video.play(); });
        target.addEventListener('targetLost', function () { video.pause(); });
      });
    </script>
  </body>
</html>
