<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>cARita</title>
    <meta property="og:title"       content="cARita" />
    <meta property="og:description" content="Still on the outside. Alive on the inside." />
    <meta property="og:image"       content="https://carita.pages.dev/assets/postcard.png" />
    <meta property="og:url"         content="https://carita.pages.dev" />
    <meta property="og:type"        content="website" />
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="cARita" />
    <meta name="twitter:description" content="Still on the outside. Alive on the inside." />
    <meta name="twitter:image"       content="https://carita.pages.dev/assets/postcard.png" />
    <link rel="stylesheet" href="./style.css" />
    <!-- A-Frame must load before MindAR -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <!-- MindAR A-Frame integration -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <!-- QR code generator for story card -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
  </head>
  <body>

    <!-- JS error display -->
    <div id="error-overlay"></div>

    <!-- Splash screen -->
    <div id="splash">
      <h1 class="splash-title">c<span class="gradient-ar">AR</span>ita</h1>
      <p class="splash-slogan">Still on the outside. Alive on the inside.</p>
      <div class="splash-divider"></div>
      <p class="splash-subtitle">Point your camera at the postcard to reveal your message</p>
      <button id="start-btn" onclick="startExperience()">Tap to Start</button>
      <p class="splash-hint">Allow camera access when prompted</p>
      <span class="built-by">Built by Fakhrul Fauzi</span>
      <span class="beta-badge">Beta</span>
    </div>

    <!-- Minimal scan frame (hidden until splash dismissed, hidden again when target found) -->
    <div id="scan-ui">
      <button id="home-btn" onclick="goHome()">&#8592; Back</button>
      <button id="torch-btn" onclick="toggleTorch()">&#9728;</button>
      <div id="ar-loader">
        <div class="ar-loader-ring"></div>
        <span class="ar-loader-text">Loading&hellip;</span>
      </div>
      <div class="scan-frame">
        <div class="scan-corner tl"></div>
        <div class="scan-corner tr"></div>
        <div class="scan-corner bl"></div>
        <div class="scan-corner br"></div>
      </div>
      <span class="scan-label">Point at postcard</span>
    </div>

    <!-- Download button: shown only when a target is actively detected -->
    <a id="download-btn" href="#" download>Save Video</a>

    <!-- Share Story button: shown alongside download when target is detected -->
    <button id="share-btn" onclick="shareStory()">Share Story</button>

    <!-- Load target list from KV (synchronous/blocking so scene is built before A-Frame inits) -->
    <script src="/api/targets-config"></script>

    <script>
      // buildScene() programmatically creates the <a-scene> from the server-supplied target list.
      // A-Frame (already loaded in <head>) picks it up via MutationObserver when it is appended.
      // This keeps autoStart: true working correctly on iOS Safari.
      function buildScene(targets) {
        if (!targets || !targets.length) {
          // No targets — still create a working scene so the camera feed appears.
          targets = [];
        }

        var scene = document.createElement('a-scene');
        scene.setAttribute('mindar-image',
          'imageTargetSrc: /api/mind; autoStart: true; uiLoading: no; uiError: yes; uiScanning: no;');
        scene.setAttribute('vr-mode-ui', 'enabled: false');
        scene.setAttribute('device-orientation-permission-ui', 'enabled: false');

        var assets = document.createElement('a-assets');

        targets.forEach(function (t) {
          // Video asset
          var vid = document.createElement('video');
          vid.id = 'video-' + t.index;
          vid.src = '/r2/' + t.videoKey;           // e.g. /r2/targets/0/video.mp4
          vid.setAttribute('preload', 'auto');
          vid.setAttribute('playsinline', '');
          vid.setAttribute('muted', '');
          vid.setAttribute('loop', '');
          vid.setAttribute('webkit-playsinline', '');
          assets.appendChild(vid);

          // Target entity
          var entity = document.createElement('a-entity');
          entity.setAttribute('mindar-image-target', 'targetIndex: ' + t.index);
          entity.dataset.video    = '#video-' + t.index;
          entity.dataset.download = '/r2/' + t.videoKey;
          entity.dataset.message  = t.message || '';

          // Video plane — default to landscape ratio; corrected once metadata loads
          var aVideo = document.createElement('a-video');
          aVideo.setAttribute('src',      '#video-' + t.index);
          aVideo.setAttribute('width',    '1');
          aVideo.setAttribute('height',   '0.667');
          aVideo.setAttribute('position', '0 0 0');
          aVideo.setAttribute('rotation', '0 0 0');
          entity.appendChild(aVideo);

          // Greeting text overlaid below the video
          var aText = document.createElement('a-text');
          aText.setAttribute('value',      t.message || '');
          aText.setAttribute('position',   '0 -0.42 0.01');
          aText.setAttribute('align',      'center');
          aText.setAttribute('width',      '1');
          aText.setAttribute('color',      '#ffffff');
          aText.setAttribute('baseline',   'top');
          aText.setAttribute('wrap-count', '30');
          entity.appendChild(aText);

          // Correct aspect ratio once the browser knows the video dimensions
          vid.addEventListener('loadedmetadata', (function (av, at) {
            return function () {
              if (!this.videoWidth || !this.videoHeight) return;
              var h = this.videoHeight / this.videoWidth;
              av.setAttribute('height', String(h));
              at.setAttribute('position', '0 ' + (-(h / 2 + 0.087)).toFixed(3) + ' 0.01');
            };
          })(aVideo, aText));

          scene.appendChild(entity);
        });

        var camera = document.createElement('a-camera');
        camera.setAttribute('position', '0 0 0');
        camera.setAttribute('look-controls', 'enabled: false');
        scene.appendChild(camera);

        scene.appendChild(assets);
        document.body.appendChild(scene);
      }

      buildScene(window.CARITA_TARGETS || []);
    </script>

    <script src="./app.js"></script>
  </body>
</html>
