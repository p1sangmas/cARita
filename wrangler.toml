name = "carita"
pages_build_output_dir = "."
compatibility_date = "2024-01-01"

[[r2_buckets]]
binding = "R2"
bucket_name = "YOUR_BUCKET_NAME"

# After running: wrangler kv:namespace create YOUR_KV_NAME
# replace the id below with the output namespace ID
[[kv_namespaces]]
binding = "KV"
id = "YOUR_NAMESPACE_ID"
